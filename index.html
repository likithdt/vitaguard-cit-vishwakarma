<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalGuard Portals</title>
    <style>
        body { font-family: 'Inter', sans-serif; text-align: center; margin-top: 100px; background-color: #f4f6f8; }
        h1 { color: #1e293b; }
        .links { margin-top: 40px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        a { text-decoration: none; font-size: 18px; padding: 15px 30px; border-radius: 8px; color: white; background: #2563eb; width: 250px; font-weight: bold; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); transition: all 0.2s;}
        a:hover { background: #1d4ed8; transform: translateY(-2px); }
        .doctor { background: #059669; } .doctor:hover { background: #047857; }
        .hospital { background: #dc2626; } .hospital:hover { background: #b91c1c; }
    </style>
</head>
<body>
    <h1>🏥 VitalGuard Access Portals</h1>
    <p>Select a portal to log in or view dashboard</p>
    <div class="links">
        <a href="/hospital_portal/" class="hospital">Hospital Portal</a>
        <a href="/doctor_portal/" class="doctor">Doctor Portal</a>
        <a href="/family_portal/">Family Portal</a>
    </div>
</body>
</html>
